{% extends "base.html" %}

{% block title %}Вход в HR-панель — HR Interview Assistant{% endblock %}

{% block content %}
<section class="page-section">
    <h2>Вход в HR-панель</h2>

    {% if error %}
    <div style="margin-top: 12px; margin-bottom: 16px; color: #b00020;">
        {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/hr/login" style="max-width: 420px; margin-top: 16px;">
        <div style="margin-bottom: 12px;">
            <label for="username">Логин</label><br>
            <input
                id="username"
                name="username"
                type="text"
                required
                style="width: 100%; padding: 8px;"
            >
        </div>

        <div style="margin-bottom: 16px;">
            <label for="password">Пароль</label><br>
            <input
                id="password"
                name="password"
                type="password"
                required
                style="width: 100%; padding: 8px;"
            >
        </div>

        <button type="submit" class="primary-button">
            Войти
        </button>
    </form>
</section>
{% endblock %}
